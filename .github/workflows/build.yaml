name: Build and push

on:
  push:
    branches: [main]
    paths:
      - "rclone-inotify/**"
      - "decap-cms/**"
      - "s3-upload-proxy/**"
      - "redis-http-proxy/**"
      - "comfyui/**"
  workflow_dispatch:
    inputs:
      image:
        description: 'Image to build'
        required: false
        type: choice
        default: all
        options:
          - all
          - decap-cms
          - rclone-inotify
          - s3-upload-proxy
          - redis-http-proxy
          - comfyui
      skip_push:
        description: 'Dry-run: build without pushing to Docker Hub'
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - context: rclone-inotify
            tags: m11s/rclone:1.74-inotify
          - context: decap-cms
            tags: m11s/decap-cms:0.2.11-s3
          - context: s3-upload-proxy
            tags: m11s/s3-upload-proxy:0.1.3
          - context: redis-http-proxy
            tags: m11s/redis-http-proxy:0.1.0
          - context: comfyui
            tags: m11s/comfyui:0.2.0
    steps:
      - name: Checkout
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.image == 'all' || inputs.image == matrix.context }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Log in to Docker Hub
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.image == 'all' || inputs.image == matrix.context }}
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Set up Docker Buildx
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.image == 'all' || inputs.image == matrix.context }}
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4.2.0

      - name: Build and push
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.image == 'all' || inputs.image == matrix.context }}
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        with:
          context: ${{ matrix.context }}
          push: ${{ github.event.inputs.skip_push != 'true' }}
          tags: ${{ matrix.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
