name: Build and push

on:
  push:
    branches: [main]
    paths:
      - "rclone-inotify/**"
  workflow_dispatch:

jobs:
  rclone-inotify:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.modified, 'rclone-inotify/') ||
      contains(github.event.head_commit.added, 'rclone-inotify/')
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: rclone-inotify
          push: true
          tags: |
            m11s/rclone:latest-inotify
            m11s/rclone:1.74-inotify
          cache-from: type=gha
          cache-to: type=gha,mode=max
