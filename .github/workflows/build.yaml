name: Build and push

on:
  push:
    branches: [main]
    paths:
      - "rclone-inotify/**"
      - "decap-cms/**"
  workflow_dispatch:
    inputs:
      skip_push:
        description: 'Dry-run: build without pushing to Docker Hub'
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - context: rclone-inotify
            tags: |
              m11s/rclone:latest-inotify
              m11s/rclone:1.74-inotify
          - context: decap-cms
            tags: |
              m11s/decap-cms:latest-s3
              m11s/decap-cms:0.1.0-s3
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: ${{ matrix.context }}
          push: ${{ github.event.inputs.skip_push != 'true' }}
          tags: ${{ matrix.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
