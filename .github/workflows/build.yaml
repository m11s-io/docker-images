name: Build and push

on:
  push:
    branches: [main]
    paths:
      - "rclone-inotify/**"
      - "decap-cms/**"
      - "s3-upload-proxy/**"
  workflow_dispatch:
    inputs:
      image:
        description: 'Image to build'
        required: false
        type: choice
        default: all
        options:
          - all
          - decap-cms
          - rclone-inotify
          - s3-upload-proxy
      skip_push:
        description: 'Dry-run: build without pushing to Docker Hub'
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - context: rclone-inotify
            tags: m11s/rclone:1.74-inotify
          - context: decap-cms
            tags: m11s/decap-cms:0.2.11-s3
          - context: s3-upload-proxy
            tags: m11s/s3-upload-proxy:0.1.3
    steps:
      - name: Checkout
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.image == 'all' || inputs.image == matrix.context }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Log in to Docker Hub
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.image == 'all' || inputs.image == matrix.context }}
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Set up Docker Buildx
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.image == 'all' || inputs.image == matrix.context }}
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Build and push
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.image == 'all' || inputs.image == matrix.context }}
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: ${{ matrix.context }}
          push: ${{ github.event.inputs.skip_push != 'true' }}
          tags: ${{ matrix.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
