events {}

http {
  include /etc/nginx/mime.types;

  server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    location ~ ^/([a-z0-9][a-z0-9-]*)/config\.yml$ {
      set $tenant $1;
      try_files /tenants/$tenant/config.yml =404;
    }

    location ~ ^/([a-z0-9][a-z0-9-]*)(/|$) {
      set $tenant $1;
      try_files /tenants/$tenant/index.html =404;
    }
  }
}
